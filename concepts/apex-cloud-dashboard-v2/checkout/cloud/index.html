<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ApexOneIQ - Cloud Sandbox Checkout</title><link rel="stylesheet" href="../../css/app.css">
	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<body>
	<main class="checkout-placeholder">
		<div class="checkout-card">
			<div class="page-kicker">Stripe Sandbox Checkout</div>
			<h1>Apex Cloud secure checkout.</h1>
			<p>This route calls the Apex backend, which creates a Stripe Sandbox Checkout Session using the Cloud price configured in environment variables.</p>
			<button class="button" data-checkout-plan="cloud">Continue to Stripe Sandbox</button>
			<a class="button" href="/pricing">Return to Plans</a>
		</div>
	</main>
	<script src="../../js/app.js"></script>
</body>
</html>
